# Go — Signature Database
# Sources: can-i-take-over-xyz, can-i-take-over-dns, dnsReaper
# Last updated: 2026-03-24
#
# Types:
#   cname_string_in_body       — CNAME matches -> HTTP body contains fingerprint
#   cname_or_ip_string_in_body — CNAME or A/AAAA matches -> HTTP body contains fingerprint
#   ip_string_in_body          — A/AAAA matches -> HTTP body contains fingerprint
#   cname_nxdomain             — CNAME matches -> CNAME target returns NXDOMAIN
#   cname_status_code          — CNAME matches -> HTTP returns specific status code
#   ns_no_soa                  — NS matches -> NS has no SOA for domain
#   generic_cname_unregistered — any external 2-part CNAME -> WHOIS shows unregistered
#   generic_cname_nxdomain     — any external CNAME (filtered) -> CNAME target NXDOMAIN
#   generic_cname_404          — any external CNAME -> HTTP 404
#   generic_ns_no_soa          — any external NS -> no SOA on that NS
#
# Adding a new signature: copy any block, change the values. No code needed.

# ━━━ CNAME or IP + string in body ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

