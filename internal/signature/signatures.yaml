# ━━━ Generic signatures ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

- name: generic_cname_unregistered
  type: generic_cname_unregistered
  confidence: confirmed
  service: "(unregistered CNAME target)"
  info: "The domain has a CNAME pointing to a domain that is not registered. You may be able to register it."

- name: generic_cname_nxdomain
  type: generic_cname_nxdomain
  confidence: potential
  service: "(dangling CNAME)"
  info: "The domain has a CNAME that does not resolve. Investigate if you can register or takeover this target."

- name: generic_cname_404_http
  type: generic_cname_404
  confidence: unlikely
  service: "(HTTP 404 on external CNAME)"
  https: false
  info: "The domain has a CNAME to a different org but the website returns 404 over HTTP."

- name: generic_cname_404_https
  type: generic_cname_404
  confidence: unlikely
  service: "(HTTPS 404 on external CNAME)"
  https: true
  info: "The domain has a CNAME to a different org but the website returns 404 over HTTPS."

- name: generic_zone_missing_on_ns
  type: generic_ns_no_soa
  confidence: potential
  service: "(missing zone on NS)"
  info: "The domain has NS records to a third-party but those nameservers do not host a zone for this domain."
